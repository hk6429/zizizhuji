<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>家長儀表板・字字珠璣</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body { max-width: 640px; margin: 0 auto; padding: 20px 16px 60px; }
  .pd-title { font-family: var(--kai); font-size: 1.4rem; color: var(--rouge-deep); text-align: center; margin: 4px 0 4px; }
  .pd-sub { text-align: center; color: var(--ink-soft); font-size: .84rem; margin: 0 0 18px; }
  .pd-lookup { display: flex; gap: 8px; margin-bottom: 18px; }
  .pd-lookup input {
    flex: 1; min-width: 0; padding: 10px 12px; font-family: monospace; font-size: 1.1rem;
    letter-spacing: .15em; text-transform: uppercase; border-radius: 8px;
    border: 1px solid rgba(43,58,74,.3); background: var(--paper-hi); color: var(--ink);
  }
  .pd-lookup button {
    padding: 10px 18px; font-family: var(--kai); font-size: .95rem; color: var(--paper-hi);
    background: var(--teal-deep); border: none; border-radius: 10px; cursor: pointer;
  }
  .pd-lookup button:disabled { background: var(--paper-dim); color: var(--ink-soft); cursor: default; }
  .pd-status { text-align: center; color: var(--ink-soft); font-size: .86rem; min-height: 20px; margin-bottom: 10px; }
  .pd-status--err { color: var(--rouge-deep); font-weight: 600; }
  .pd-card {
    background: var(--paper-hi); border: 1px solid rgba(201,162,39,.4); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 14px;
  }
  .pd-card h2 { font-family: var(--kai); font-size: 1.05rem; color: var(--navy); margin: 0 0 10px; }
  .pd-stats { display: flex; gap: 10px; flex-wrap: wrap; }
  .pd-stat { flex: 1 1 100px; text-align: center; background: var(--paper); border-radius: 8px; padding: 8px; }
  .pd-stat b { display: block; font-family: var(--serif); font-size: 1.3rem; color: var(--teal-deep); }
  .pd-stat span { font-size: .78rem; color: var(--ink-soft); }
  .pd-weak-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: .86rem; }
  .pd-weak-row .pd-weak-label { flex: 0 0 60px; color: var(--ink); }
  .pd-weak-bar { flex: 1; height: 10px; border-radius: 6px; background: var(--paper-dim); overflow: hidden; }
  .pd-weak-bar > span { display: block; height: 100%; background: var(--teal); }
  .pd-weak-pct { flex: 0 0 42px; text-align: right; color: var(--ink-soft); font-size: .8rem; }
  .pd-wrong-list { list-style: none; margin: 0; padding: 0; }
  .pd-wrong-list li {
    display: flex; justify-content: space-between; gap: 8px; padding: 6px 0;
    border-bottom: 1px dashed rgba(85,99,111,.2); font-size: .88rem;
  }
  .pd-wrong-list li:last-child { border-bottom: none; }
  .pd-wrong-list .pd-wrong-q { color: var(--ink); }
  .pd-wrong-list .pd-wrong-n { color: var(--rouge-deep); font-weight: 700; white-space: nowrap; }
  .pd-trend { display: flex; align-items: flex-end; gap: 3px; height: 80px; }
  .pd-trend-bar { flex: 1; min-width: 4px; background: var(--teal); border-radius: 2px 2px 0 0; position: relative; }
  .pd-trend-bar[data-answered="0"] { background: var(--paper-dim); }
  .pd-empty { color: var(--ink-soft); font-size: .86rem; text-align: center; padding: 8px 0; }
  .pd-hint { color: var(--ink-soft); font-size: .78rem; margin-top: -8px; margin-bottom: 16px; text-align: center; }
</style>
</head>
<body>
  <h1 class="pd-title">家長儀表板</h1>
  <p class="pd-sub">唯讀報表，只看不改——輸入孩子的雲端存檔代碼即可查詢，不會覆蓋任何進度</p>

  <div class="pd-lookup">
    <input id="pd-code" type="text" maxlength="6" placeholder="輸入 6 碼存檔代碼" autocomplete="off" aria-label="存檔代碼">
    <button id="pd-go" type="button">查詢</button>
  </div>
  <p id="pd-status" class="pd-status"></p>

  <div id="pd-report" hidden>
    <div class="pd-card">
      <h2>練習量與對錯率</h2>
      <div class="pd-stats">
        <div class="pd-stat"><b id="pd-total-answered">0</b><span>累計答題</span></div>
        <div class="pd-stat"><b id="pd-total-correct">0</b><span>累計答對</span></div>
        <div class="pd-stat"><b id="pd-accuracy">0%</b><span>整體正確率</span></div>
        <div class="pd-stat"><b id="pd-streak">0</b><span>目前連續天數</span></div>
      </div>
    </div>

    <div class="pd-card">
      <h2>弱點分類（依正確率由低到高）</h2>
      <div id="pd-weak-list"></div>
    </div>

    <div class="pd-card">
      <h2>常錯字</h2>
      <ul id="pd-wrong-ziyin" class="pd-wrong-list"></ul>
    </div>

    <div class="pd-card">
      <h2>常錯成語</h2>
      <ul id="pd-wrong-chengyu" class="pd-wrong-list"></ul>
    </div>

    <div class="pd-card">
      <h2>近 30 天答題趨勢</h2>
      <div id="pd-trend" class="pd-trend"></div>
    </div>
  </div>

  <script type="module" src="js/parent-dashboard.js"></script>
</body>
</html>
